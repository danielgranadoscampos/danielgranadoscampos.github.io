<nav>
  <ul>
    <li><a href="{{ '/' | relative_url }}" class="site-title">{{ site.title }}</a></li>
    {% for link in site.navbar-links %}
      {% for item in link %}
        <li><a href="{{ '/' | relative_url }}{{ item[1] }}" {% if page.url == '/' | append: item[1] | append: '/' %}class="active"{% endif %}>{{ item[0] }}</a></li>
      {% endfor %}
    {% endfor %}
  </ul>
</nav>
