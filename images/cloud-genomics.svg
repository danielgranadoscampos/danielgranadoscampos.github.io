<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" font-family="'Fira Mono', 'Consolas', monospace">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#87ff87"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-soft">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1200" height="400" fill="#000"/>

  <!-- subtle grid -->
  <g opacity="0.04" stroke="#87ff87">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
  </g>

  <!-- ===== LLM BOX (left) ===== -->
  <rect x="40" y="80" width="220" height="240" rx="2" fill="#111" stroke="#87ff8755" stroke-width="1"/>
  <!-- title bar -->
  <rect x="40" y="80" width="220" height="24" rx="2" fill="#1a1a1a"/>
  <circle cx="54" cy="92" r="4" fill="#ff5f5f"/>
  <circle cx="66" cy="92" r="4" fill="#ffaf5f"/>
  <circle cx="78" cy="92" r="4" fill="#87ff87"/>
  <text x="150" y="96" text-anchor="middle" fill="#999" font-size="10">gpt-5</text>

  <text x="150" y="135" text-anchor="middle" fill="#5fffff" font-size="13" font-weight="bold">LLM</text>

  <text x="150" y="170" text-anchor="middle" fill="#ffd7af" font-size="10">data analysis</text>
  <text x="150" y="188" text-anchor="middle" fill="#ffd7af" font-size="10">hypothesis gen</text>
  <text x="150" y="206" text-anchor="middle" fill="#ffd7af" font-size="10">experiment design</text>

  <!-- prompt cursor -->
  <text x="70" y="245" fill="#87ff87" font-size="11">$</text>
  <text x="82" y="245" fill="#ffd7af" font-size="11">design_next()</text>
  <rect x="192" y="234" width="7" height="13" fill="#ffd7af" opacity="0.7"/>

  <text x="150" y="280" text-anchor="middle" fill="#999" font-size="9">San Francisco</text>

  <!-- ===== FLOW ARROW: LLM -> Schema ===== -->
  <path d="M 270 170 L 370 170" stroke="#87ff87" stroke-width="1.5" fill="none" marker-end="url(#arrow)" filter="url(#glow)"/>
  <text x="320" y="160" text-anchor="middle" fill="#87ff87" font-size="9" opacity="0.7">design</text>

  <!-- ===== SCHEMA BOX (center-left) ===== -->
  <rect x="380" y="100" width="200" height="140" rx="2" fill="#111" stroke="#87ff8755" stroke-width="1"/>
  <rect x="380" y="100" width="200" height="24" rx="2" fill="#1a1a1a"/>
  <circle cx="394" cy="112" r="4" fill="#ff5f5f"/>
  <circle cx="406" cy="112" r="4" fill="#ffaf5f"/>
  <circle cx="418" cy="112" r="4" fill="#87ff87"/>
  <text x="480" y="116" text-anchor="middle" fill="#999" font-size="10">pydantic</text>

  <text x="395" y="148" fill="#ff87af" font-size="10">{</text>
  <text x="405" y="164" fill="#5fffff" font-size="10">"plate_id"</text>
  <text x="495" y="164" fill="#ffd7af" font-size="10">: ".."</text>
  <text x="405" y="180" fill="#5fffff" font-size="10">"samples"</text>
  <text x="490" y="180" fill="#ffd7af" font-size="10">: [...]</text>
  <text x="405" y="196" fill="#5fffff" font-size="10">"reagents"</text>
  <text x="495" y="196" fill="#ffd7af" font-size="10">: [...]</text>
  <text x="395" y="212" fill="#ff87af" font-size="10">}</text>

  <text x="480" y="225" text-anchor="middle" fill="#87ff87" font-size="9">validated</text>

  <!-- ===== FLOW ARROW: Schema -> Cloud Lab ===== -->
  <path d="M 590 170 L 690 170" stroke="#87ff87" stroke-width="1.5" fill="none" marker-end="url(#arrow)" filter="url(#glow)"/>
  <text x="640" y="160" text-anchor="middle" fill="#87ff87" font-size="9" opacity="0.7">API call</text>

  <!-- ===== CLOUD LAB BOX (center-right) ===== -->
  <rect x="700" y="80" width="220" height="240" rx="2" fill="#111" stroke="#87ff8755" stroke-width="1"/>
  <rect x="700" y="80" width="220" height="24" rx="2" fill="#1a1a1a"/>
  <circle cx="714" cy="92" r="4" fill="#ff5f5f"/>
  <circle cx="726" cy="92" r="4" fill="#ffaf5f"/>
  <circle cx="738" cy="92" r="4" fill="#87ff87"/>
  <text x="810" y="96" text-anchor="middle" fill="#999" font-size="10">cloud-lab</text>

  <text x="810" y="135" text-anchor="middle" fill="#5fffff" font-size="13" font-weight="bold">RACs</text>

  <text x="810" y="170" text-anchor="middle" fill="#ffd7af" font-size="10">liquid handling</text>
  <text x="810" y="188" text-anchor="middle" fill="#ffd7af" font-size="10">incubation</text>
  <text x="810" y="206" text-anchor="middle" fill="#ffd7af" font-size="10">fluorescence</text>
  <text x="810" y="224" text-anchor="middle" fill="#ffd7af" font-size="10">plate reading</text>

  <!-- status indicator -->
  <circle cx="730" cy="270" r="4" fill="#87ff87" filter="url(#glow)"/>
  <text x="740" y="274" fill="#87ff87" font-size="10">running</text>

  <text x="810" y="300" text-anchor="middle" fill="#999" font-size="9">Boston, MA</text>

  <!-- ===== FLOW ARROW: Cloud Lab -> Results ===== -->
  <path d="M 930 200 L 1010 200" stroke="#87ff87" stroke-width="1.5" fill="none" marker-end="url(#arrow)" filter="url(#glow)"/>
  <text x="970" y="190" text-anchor="middle" fill="#87ff87" font-size="9" opacity="0.7">results</text>

  <!-- ===== RESULTS BOX (right) ===== -->
  <rect x="1020" y="120" width="150" height="120" rx="2" fill="#111" stroke="#87ff8755" stroke-width="1"/>
  <rect x="1020" y="120" width="150" height="24" rx="2" fill="#1a1a1a"/>
  <circle cx="1034" cy="132" r="4" fill="#ff5f5f"/>
  <circle cx="1046" cy="132" r="4" fill="#ffaf5f"/>
  <circle cx="1058" cy="132" r="4" fill="#87ff87"/>
  <text x="1095" y="136" text-anchor="middle" fill="#999" font-size="10">data</text>

  <text x="1035" y="162" fill="#ff87af" font-size="9">{</text>
  <text x="1042" y="175" fill="#5fffff" font-size="9">"titer"</text>
  <text x="1085" y="175" fill="#ffd7af" font-size="9">: 2.1</text>
  <text x="1042" y="189" fill="#5fffff" font-size="9">"cost"</text>
  <text x="1080" y="189" fill="#ffd7af" font-size="9">: 422</text>
  <text x="1042" y="203" fill="#5fffff" font-size="9">"plate"</text>
  <text x="1085" y="203" fill="#ffd7af" font-size="9">: 64</text>
  <text x="1035" y="217" fill="#ff87af" font-size="9">}</text>

  <!-- ===== RETURN ARROW: Results -> LLM (bottom arc) ===== -->
  <path d="M 1095 250 C 1095 360, 150 360, 150 330" stroke="#87ff87" stroke-width="1.5" fill="none" stroke-dasharray="6,4" marker-end="url(#arrow)" filter="url(#glow)"/>
  <text x="600" y="370" text-anchor="middle" fill="#87ff87" font-size="10">iterate &#8212; ~1 hour/cycle &#215; 6 rounds &#8212; 36,000 experiments</text>

  <!-- top label -->
  <text x="600" y="35" text-anchor="middle" fill="#87ff87" font-size="16" font-weight="bold" filter="url(#glow-soft)">Wet Lab as a Service</text>
  <text x="600" y="55" text-anchor="middle" fill="#999" font-size="11">autonomous cloud laboratory architecture</text>
</svg>
