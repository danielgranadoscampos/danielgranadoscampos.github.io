---
layout: default
---

<article>
  {% if page.banner %}
  <img src="{{ page.banner | relative_url }}" alt="{{ page.title }}" class="post-banner">
  {% endif %}
  <div class="post-header">
    <h1>{{ page.title }}</h1>
    <div class="post-meta">
      {{ page.date | date: "%B %-d, %Y" }}{% if page.author %} &middot; {{ page.author }}{% endif %}
    </div>
    {% if page.tags.size > 0 %}
    <div>
      {% for tag in page.tags %}
      <span class="tag">{{ tag }}</span>
      {% endfor %}
    </div>
    {% endif %}
  </div>
  <div class="post-content">
    {{ content }}
  </div>
</article>
