title: daniel@github
url: "https://danielgranadoscampos.github.io"
baseurl: ""
author: Daniel
subtitle: "hey, i'm daniel -- health data science student."
description: "Personal website and blog"

# Navigation
navbar-links:
  About Me: "aboutme"

# Avatar (upload your image to /images/ and update the path)
# avatar: "/images/avatar.png"

# Social links (uncomment and fill in yours)
# social:
#   email: "you@example.com"
#   github: "yourusername"
#   linkedin: "yourprofile"

# Jekyll settings
markdown: kramdown
highlighter: rouge
permalink: /:year-:month-:day-:title/
paginate: 5
timezone: "Europe/Madrid"

kramdown:
  input: GFM

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
    values:
      layout: "page"

plugins:
  - jekyll-paginate
  - jekyll-sitemap

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE
  - _preview
